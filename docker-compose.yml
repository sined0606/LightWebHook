services:
  lightwebhook:
    build:
      context: .
    container_name: lightwebhook
    restart: unless-stopped
    environment:
      APP_CONFIG_PATH: /app/config/webhooks.json
      DB_PATH: /data/webhooks.db
      ADMIN_SECRET_FILE: /run/secrets/admin_secret
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
      - ./secrets:/run/secrets:ro
    expose:
      - "8000"
    networks:
      - lightwebhook

  nginx:
    image: nginx:1.27-alpine
    container_name: lightwebhook_nginx
    restart: unless-stopped
    depends_on:
      - lightwebhook
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lightwebhook

networks:
  lightwebhook:
    driver: bridge
